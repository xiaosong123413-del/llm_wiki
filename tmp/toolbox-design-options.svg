  <circle cx="1386" cy="620" r="13" stroke="#42527A" stroke-width="2.5"/>
  <circle cx="1397" cy="608" r="5" fill="#FF4D4F"/>
  <circle cx="1450" cy="620" r="24" fill="#DDE6FF"/>
