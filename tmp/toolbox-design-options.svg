  <rect x="118" y="704" width="306" height="54" rx="18" fill="url(#accent)"/>
  <text x="230" y="738" style="font:700 18px 'Microsoft YaHei UI','Segoe UI',sans-serif; fill:#FFFFFF;">工作流</text>
  <text x="525" y="738" class="section">工具资产</text>

  <rect x="114" y="790" width="1000" height="286" rx="24" fill="#FFFFFF" stroke="#E0E7FF"/>
  <text x="142" y="832" class="section">工作流</text>
  <text x="142" y="858" class="small">工作流 = 场景，Agent = 执行者</text>
  <rect x="400" y="840" width="268" height="28" rx="14" fill="#EEF2FF"/>
  <text x="420" y="858" class="small">每条工作流都由一个专属 Agent 执行</text>

  <rect x="142" y="890" width="438" height="58" rx="18" fill="#FBFCFF" stroke="#E4EAFF"/>
  <circle cx="176" cy="919" r="16" fill="#EEEAFE"/>
