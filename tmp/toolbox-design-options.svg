<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4C63FF"/>
      <stop offset="1" stop-color="#2A46F5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#2F4FD1" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 42px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #18233F; }
      .subtitle { font: 400 18px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #677393; }
      .section { font: 700 18px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #27314F; }
      .label { font: 700 14px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #4A5C93; letter-spacing: 1px; }
      .body { font: 400 15px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #5E6A88; }
      .small { font: 400 13px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #7280A4; }
      .chip { font: 700 12px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #5271FF; }
      .strong { font: 700 16px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #1C2742; }
      .tiny { font: 700 11px 'Microsoft YaHei UI', 'Segoe UI', sans-serif; fill: #8693B3; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="1280" rx="0" fill="url(#bg)"/>

  <text x="72" y="84" class="title">工具箱页复刻设计</text>
  <text x="72" y="118" class="subtitle">目标：替换现有 workspace -&gt; toolbox，版式贴近参考图，条目内容映射项目真实语义，数据以新结构为主并保留旧 Markdown 迁移层。</text>

  <rect x="72" y="156" width="452" height="250" rx="28" fill="#FFFFFF" stroke="#DCE5FF" filter="url(#shadow)"/>
  <rect x="96" y="186" width="84" height="30" rx="15" fill="#EEF2FF"/>
  <text x="118" y="206" class="chip">方案 A</text>
  <text x="96" y="252" class="section">单文件内联重写</text>
  <text x="96" y="286" class="body">直接在现有 workspace/index.ts 里重做工具箱页，服务端也继续沿用现有接口补字段。</text>
  <text x="96" y="330" class="label">优点</text>
  <text x="96" y="356" class="body">改动路径最短，能最快接上线。</text>
  <text x="96" y="392" class="label">问题</text>
  <text x="96" y="418" class="body">现有文件已经偏大，继续堆叠后续很难维护。</text>

  <rect x="574" y="156" width="452" height="250" rx="28" fill="#FFFFFF" stroke="#5470FF" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="598" y="186" width="84" height="30" rx="15" fill="#E8ECFF"/>
  <text x="620" y="206" class="chip">方案 B</text>
  <text x="598" y="252" class="section">模块化替换，保留原入口</text>
  <text x="598" y="286" class="body">入口仍是 workspace -&gt; toolbox，但工具箱页拆成独立前端模块、独立 view-model 和迁移层。</text>
  <text x="598" y="330" class="label">优点</text>
  <text x="598" y="356" class="body">满足直接替换，同时避免把 workspace 主文件继续拖垮。</text>
  <text x="598" y="392" class="label">推荐原因</text>
  <text x="598" y="418" class="body">这是最短正确路径，不是补丁，也不会引入双页面和双状态。</text>
  <rect x="902" y="184" width="92" height="34" rx="17" fill="url(#accent)"/>
  <text x="928" y="206" style="font:700 13px 'Microsoft YaHei UI','Segoe UI',sans-serif; fill:#FFFFFF;">推荐</text>

  <rect x="1076" y="156" width="452" height="250" rx="28" fill="#FFFFFF" stroke="#DCE5FF" filter="url(#shadow)"/>
  <rect x="1100" y="186" width="84" height="30" rx="15" fill="#EEF2FF"/>
  <text x="1122" y="206" class="chip">方案 C</text>
  <text x="1100" y="252" class="section">新页面再嵌回 workspace</text>
  <text x="1100" y="286" class="body">先独立做一套完整新页面，再通过 iframe 或注入方式塞回现有入口。</text>
  <text x="1100" y="330" class="label">优点</text>
  <text x="1100" y="356" class="body">最自由，做 1:1 外观最快。</text>
  <text x="1100" y="392" class="label">问题</text>
  <text x="1100" y="418" class="body">长期会有双结构和双状态，维护成本最高。</text>

  <text x="72" y="486" class="label">推荐落地稿</text>
  <text x="72" y="518" class="subtitle">下面是按方案 B 组织后的首页草图：保留参考图的结构关系，但条目语义映射到你项目真实的工具箱内容。</text>

  <rect x="72" y="554" width="1456" height="570" rx="34" fill="#FFFFFF" stroke="#D8E2FF" filter="url(#shadow)"/>

  <text x="114" y="626" class="title" style="font-size:34px;">工具箱</text>
  <text x="114" y="658" class="subtitle" style="font-size:17px;">按工作流与工具资产组织常用能力，让编译、整理、检索与发布路径更清晰。</text>

  <rect x="970" y="588" width="346" height="64" rx="20" fill="#F8FAFF" stroke="#DEE6FF"/>
  <circle cx="1008" cy="620" r="11" stroke="#7A88AF" stroke-width="3"/>
  <line x1="1016" y1="628" x2="1026" y2="638" stroke="#7A88AF" stroke-width="3" stroke-linecap="round"/>
