  <text x="464" y="997" class="chip">→</text>
  <text x="514" y="997" class="strong">整理 Agent</text>

  <rect x="614" y="890" width="438" height="58" rx="18" fill="#FBFCFF" stroke="#E4EAFF"/>
  <circle cx="648" cy="919" r="16" fill="#FFF0EB"/>
  <text x="678" y="925" class="strong">编译发布流</text>
  <text x="876" y="925" class="chip">1:1</text>
  <text x="936" y="925" class="chip">→</text>
  <text x="986" y="925" class="strong">发布 Agent</text>

  <rect x="614" y="962" width="438" height="58" rx="18" fill="#FBFCFF" stroke="#E4EAFF"/>
  <circle cx="648" cy="991" r="16" fill="#EAFBF6"/>
  <text x="678" y="997" class="strong">检索问答流</text>
  <text x="876" y="997" class="chip">1:1</text>
  <text x="936" y="997" class="chip">→</text>
  <text x="986" y="997" class="strong">检索 Agent</text>

  <rect x="1154" y="700" width="332" height="428" rx="24" fill="#FFFFFF" stroke="#E0E7FF"/>
