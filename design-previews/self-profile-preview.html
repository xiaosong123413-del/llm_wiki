<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Profile Preview</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --panel: rgba(255,255,255,.9);
      --line: #dbe6ff;
      --text: #183153;
      --muted: #6f84a8;
      --accent: #4f7cff;
      --accent-soft: #eef3ff;
      --green: #52b788;
      --orange: #ffb84d;
      --shadow: 0 18px 40px rgba(91, 125, 191, .12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      height: 100vh;
      overflow-x: hidden;
      overflow-y: hidden;
      background:
        radial-gradient(circle at top left, rgba(96,145,255,.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(145,112,255,.14), transparent 22%),
        linear-gradient(180deg, #fbfdff 0%, #f2f7ff 100%);
    }
    .app {
      height: 100vh;
      width: min(1360px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 14px 0 16px;
    }
    .chip, .action, .nav-card, .timeline-toggle, .subpage-switch {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: .18s ease;
    }
    .chip.active, .timeline-toggle.active, .subpage-switch.active {
      background: linear-gradient(135deg, #5b7cff, #7f69ff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(91, 124, 255, .28);
    }
    .main {
      height: 100%;
      padding: 8px 10px 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }
    .topbar, .hero, .stage-board, .quick-nav, .summary-grid > article, .timeline-shell, .page-shell, .comment-drawer {
      background: var(--panel);
      border: 1px solid rgba(219, 230, 255, .9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
    }
    .topbar {
      width: 80%;
      margin: 0 auto;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .topbar-spacer { min-width: 0; }
    .search {
      width: min(270px, 100%);
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--muted);
      background: #fff;
      text-align: center;
      font-size: 12px;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: end;
    }
    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 4.45fr) minmax(220px, .95fr);
      gap: 10px;
      min-height: 0;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      height: 100%;
      min-width: 0;
      min-height: 0;
    }
    #homeView {
      display: grid;
      grid-column: 1;
      grid-row: 1;
      height: 100%;
      grid-template-rows: minmax(66px, .07fr) minmax(56px, .06fr) minmax(0, .87fr);
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }
    #pageViews {
      display: none;
      grid-column: 1;
      grid-row: 1;
      height: 100%;
      min-height: 0;
    }
    #pageViews.active {
      display: block;
    }
    .hero, .page-shell, .timeline-shell { padding: 10px 12px; }
    .hero { width: 100%; }
    .hero-body {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(180deg, #b8d0ff, #edf4ff);
      display: grid; place-items: center; font-size: 26px; font-weight: 800;
    }
    .eyebrow { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1, h2, h3, p { margin: 0; }
    h1 { margin-top: 2px; font-size: 26px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    .subtitle { margin-top: 4px; color: var(--muted); line-height: 1.35; font-size: 11px; }
    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .toolbar, .timeline-picks { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip, .action, .timeline-toggle, .subpage-switch {
      padding: 5px 9px;
      border-radius: 11px;
      font-size: 10px;
      font-weight: 700;
    }
    .toolbar { margin-top: 8px; }
    .page-list, .timeline-list, .comment-list { list-style: none; margin: 0; padding: 0; }
    .page-list li {
      display: grid; grid-template-columns: 1fr auto auto; gap: 14px;
      padding: 13px 0; border-bottom: 1px solid rgba(219,230,255,.75);
      align-items: center;
    }
    .page-list li:last-child { border-bottom: 0; }
    .badge {
      padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 800;
      background: #eef7f1; color: var(--green);
    }
    .quick-nav {
      width: 100%;
      padding: 6px 12px 8px;
      min-height: 0;
    }
    .quick-nav-rail {
      overflow: hidden;
      margin-top: 0;
      min-height: 0;
    }
    .quick-nav-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scroll-snap-type: x proximity;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      align-items: stretch;
    }
    .nav-card {
      flex: 0 0 calc((100% - 40px) / 5);
      min-width: calc((100% - 40px) / 5);
      min-height: 44px;
      padding: 6px 9px;
      border-radius: 14px;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 7px;
      scroll-snap-align: start;
      background:
        radial-gradient(circle at top right, rgba(79,124,255,.18), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }
    .nav-card:hover, .action:hover, .chip:hover, .timeline-toggle:hover, .subpage-switch:hover { transform: translateY(-1px); }
    .nav-card strong { display: block; font-size: 11px; line-height: 1.15; }
    .nav-card__icon {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      background: linear-gradient(135deg, #edf3ff, #dfeaff);
      color: var(--accent);
      display: grid;
      place-items: center;
    }
    .nav-card__icon svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .summary-grid {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: stretch;
      align-items: stretch;
    }
    .summary-grid > article {
      padding: 12px 12px 10px;
      display: grid;
      grid-template-rows: auto minmax(66px, .42fr) minmax(0, .38fr) minmax(52px, .2fr);
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    .summary-grid ul {
      margin: 6px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.35;
      font-size: 11px;
      display: grid;
      gap: 4px;
    }
    .summary-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .summary-card__metric {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }
    .summary-card__visual {
      margin: 6px 0 5px;
      padding: 8px 10px;
      border: 1px solid rgba(219, 230, 255, .85);
      border-radius: 14px;
      background: linear-gradient(180deg, #fbfdff 0%, #f3f7ff 100%);
      min-height: 54px;
      display: grid;
      align-content: center;
    }
    .summary-bars {
      display: grid;
      gap: 8px;
    }
    .summary-bars div {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(91,124,255,.95), rgba(123,107,255,.68));
    }
    .summary-dots {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-dots span {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #9bb8ff;
      box-shadow: 0 0 0 6px rgba(155,184,255,.16);
    }
    .summary-timeline {
      display: grid;
      gap: 8px;
    }
    .summary-timeline div {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .summary-timeline strong {
      color: var(--text);
      font-size: 12px;
    }
    .summary-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .summary-tags span {
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid rgba(219, 230, 255, .9);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .summary-card__facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
    }
    .summary-card__fact {
      min-height: 44px;
      padding: 8px 9px;
      border-radius: 12px;
      border: 1px solid rgba(219, 230, 255, .9);
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
      display: grid;
      align-content: center;
      gap: 2px;
    }
    .summary-card__fact strong {
      font-size: 12px;
      color: var(--text);
    }
    .summary-card__fact span {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.25;
    }
    .timeline-shell { display: grid; grid-template-rows: auto auto 1fr; gap: 10px; min-height: 0; }
    .timeline-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .timeline-picks { font-size: 11px; color: var(--muted); }
    .timeline-list {
      overflow: auto;
      padding-right: 6px;
      display: grid;
      gap: 10px;
      min-height: 0;
    }
    .phase {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }
    .phase h3 { font-size: 13px; margin-bottom: 8px; }
    .event {
      padding-left: 12px;
      border-left: 2px solid #bfd1ff;
      margin-left: 6px;
      display: grid;
      gap: 4px;
    }
    .event + .event { margin-top: 10px; }
    .event small { color: var(--muted); font-size: 11px; }
    .event strong { font-size: 13px; }
    .event .flags { display: flex; gap: 8px; flex-wrap: wrap; }
    .flag { padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; background: var(--accent-soft); color: var(--accent); }
    .flag.orphan { background: #fff3e0; color: #d9822b; }
    .page-shell { display: none; }
    .page-shell.active { display: grid; gap: 16px; }
    .subpage-nav {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .page-columns { display: grid; grid-template-columns: 1.3fr .9fr; gap: 16px; }
    .block {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
    }
    .block p, .block li { color: var(--muted); line-height: 1.8; }
    .comment-drawer {
      position: fixed; top: 24px; right: 24px; width: 360px; max-height: calc(100vh - 48px);
      padding: 18px; display: none; z-index: 20;
    }
    .comment-drawer.open { display: grid; gap: 12px; }
    .comment-list { display: grid; gap: 12px; overflow: auto; }
    .comment {
      padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: #fff;
    }
    .comment b { display: block; margin-bottom: 6px; }
    .comment p { color: var(--muted); margin-bottom: 8px; }
    .comment .flag { margin-right: 8px; }
    @media (max-width: 1400px) {
      .layout, .page-columns, .summary-grid { grid-template-columns: 1fr; }
      .timeline-shell { min-height: 520px; }
      .quick-nav-grid {
        overflow-x: auto;
      }
      .nav-card {
        flex-basis: min(200px, 40vw);
        min-width: min(200px, 40vw);
      }
      .topbar {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <header class="topbar">
        <div class="topbar-spacer"></div>
        <div class="search">搜索人物、事件、习惯、笔记...</div>
        <div class="topbar-actions">
          <button class="action">编辑</button>
          <button class="action" data-open-comments>评论</button>
          <button class="action">AI整理本页</button>
        </div>
      </header>
      <div class="layout">
        <section class="content">
          <section id="homeView"></section>
          <section id="pageViews"></section>
        </section>
        <aside class="timeline-shell">
          <div class="timeline-head">
            <div>
              <div class="eyebrow">Life Timeline</div>
              <h2>完整人生时间线</h2>
            </div>
            <button class="timeline-toggle active">独立滚动</button>
          </div>
          <div class="timeline-picks">`About Me` 只会展示这里被手动勾选的事件</div>
          <div class="timeline-list" id="timelineList"></div>
        </aside>
      </div>
    </main>
  </div>
  <aside class="comment-drawer" id="commentDrawer">
    <div class="timeline-head">
      <h3>评论</h3>
      <button class="action" id="closeComments">关闭</button>
    </div>
    <div class="comment-list">
      <article class="comment"><b>当前阶段概览</b><p>这一段需要更聚焦“长期建设者”的身份表达。</p><span class="flag">待处理</span></article>
      <article class="comment"><b>2019 · 转专业阶段</b><p>事件卡片在正文里暂时没显示，但评论保留，不自动删除。</p><span class="flag orphan">未定位</span></article>
      <article class="comment"><b>健康与睡眠</b><p>建议把深睡趋势和入睡时间波动放到页面更靠前位置。</p><span class="flag">已解决</span></article>
    </div>
  </aside>
  <script>
    const pages = [
      ["home", "总览", "个人信息主页"],
      ["relations", "人际关系", "关键人物、关系阶段与边界"],
      ["portrait", "个人画像", "身份、自我定义与行为模式"],
      ["prefs", "偏好", "审美、学习、工作与社交偏好"],

      ["dreams", "梦境档案", "梦境、反复意象与联想"],

    ];
    const pageBlocks = {

      portrait: ["当前身份定义", "优势与风险", "行为模式与决策倾向"],
      prefs: ["审美偏好", "学习偏好", "工作与社交偏好"],
      mood: ["近期主情绪", "压力与触发源", "恢复方式与能量波动"],

    const timeline = [
      { phase: "童年与家庭底色", events: [["2006", "早期性格形成", ["完整保留"]], ["2012", "第一次明确的兴趣偏好", ["已勾选到 About Me"]]] },
      { phase: "学生阶段与自我探索", events: [["2018", "转向更主动的自我建设", ["待整理"]], ["2021", "重要的人际关系变化", ["评论 2 条"]], ["2023", "系统化记录习惯形成", ["已勾选到 About Me"]]] },
      { phase: "当前阶段", events: [["2025-05", "个人知识系统迭代", ["已勾选到 About Me"]], ["2026-04", "健康数据接入与睡眠追踪", ["评论 1 条"]], ["2026-04", "自我档案体系建立", ["完整保留"]]] },

    const homeView = document.getElementById("homeView");
    const pageViews = document.getElementById("pageViews");
    const timelineList = document.getElementById("timelineList");
    const drawer = document.getElementById("commentDrawer");
    const pageIcons = {
      relations: `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="8" cy="8" r="3"></circle><circle cx="16" cy="9" r="2.5"></circle><path d="M3.5 18c.8-2.9 3-4.5 5.5-4.5s4.7 1.6 5.5 4.5"></path><path d="M13.5 18c.5-1.8 1.9-3.1 3.9-3.1 1.5 0 2.8.7 3.4 2.1"></path></svg>`,

      dreams: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 5.5a5.5 5.5 0 1 0 7 7 6 6 0 1 1-7-7z"></path><path d="M16.5 6.5h4"></path><path d="M18.5 4.5v4"></path></svg>`,

      destiny: `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 4a4 4 0 0 1 0 8 4 4 0 0 0 0 8"></path><circle cx="10" cy="8" r="1"></circle><circle cx="14" cy="16" r="1"></circle></svg>`,

    };
    const summaryCards = [
      {
        title: "人际关系摘要",
        metric: "12 位",
        visual: `<div class="summary-dots"><span></span><span style="width:14px;height:14px;"></span><span></span><span></span><span></span></div>`,
        bullets: ["核心人物已形成清晰分层", "关系节点与阶段变化可回看", "近期维护重点集中在核心人物与合作关系"],
        facts: [["核心人物", "4 位"], ["活跃联系", "3 条"], ["近期波动", "1 条"]],
      },
      {
        title: "个人画像摘要",
        metric: "3 特征",
        visual: `<div class="summary-bars"><div style="width:88%"></div><div style="width:72%"></div><div style="width:64%"></div></div>`,
        bullets: ["更偏长期系统建设型", "容易对表达质量要求较高", "最近在强化记录、复盘与迭代闭环"],
        facts: [["优势", "系统建设"], ["风险", "表达苛刻"], ["趋势", "复盘增强"]],
      },
      {
        title: "健康与睡眠摘要",
        metric: "睡眠优先",
        visual: `<div class="summary-bars"><div style="width:76%"></div><div style="width:58%;background:linear-gradient(90deg,#65c18c,#8fd6ac);"></div><div style="width:69%;background:linear-gradient(90deg,#8aa8ff,#b3bfff);"></div></div>`,
        bullets: ["重点关注入睡、起床、深睡质量", "最近两周睡眠波动仍偏大", "后续会结合趋势与评论继续追踪"],
        facts: [["入睡", "偏晚"], ["起床", "波动"], ["深睡", "需提升"]],
      },
      {
        title: "目标与价值观摘要",
        metric: "长期",
        visual: `<div class="summary-tags"><span>真实记录</span><span>长期建设</span><span>可持续</span></div>`,
        bullets: ["强调长期建设与真实记录", "优先可持续而非一次性包装", "当前目标围绕自我系统搭建展开"],
        facts: [["目标", "系统搭建"], ["原则", "真实"], ["节奏", "长期"]],
      },
    ];
    function renderHome() {
      const quickNav = pages.slice(1).map(([id, label]) => `
        <button class="nav-card" data-page="${id}">
          <span class="nav-card__icon">${pageIcons[id] ?? ""}</span>
          <strong>${label}</strong>
        </button>`).join("");
      homeView.innerHTML = `
        <section class="hero">
          <div class="hero-body">
            <div class="avatar">宋</div>
            <div>
              <div class="eyebrow">Personal Hub</div>
              <p class="subtitle">身份：长期建设者 / 知识系统实践者 / 自我记录者。当前阶段：在持续搭建自己的任务、健康、时间线与关系系统。</p>
              <div class="tag-row" style="margin-top:8px;">
                <span class="chip active">长期主义</span><span class="chip">系统感</span><span class="chip">自我观察</span><span class="chip">持续迭代</span>
              </div>
            </div>
          </div>
        </section>
        <section class="quick-nav">
          <div class="quick-nav-rail">
            <div class="quick-nav-grid">${quickNav}</div>
          </div>
        </section>
        <section class="summary-grid">
          ${summaryCards.map((card) => `
            <article>
              <div class="summary-card__head">
                <h3>${card.title}</h3>
                <span class="summary-card__metric">${card.metric}</span>
              </div>
              <div class="summary-card__visual">${card.visual}</div>
              <ul>${card.bullets.map((bullet) => `<li>${bullet}</li>`).join("")}</ul>
              <div class="summary-card__facts">${(card.facts ?? []).map(([label, value]) => `<div class="summary-card__fact"><strong>${label}</strong><span>${value}</span></div>`).join("")}</div>
            </article>
          `).join("")}
        </section>`;
      homeView.querySelectorAll("[data-page]").forEach((node) => node.addEventListener("click", () => openPage(node.dataset.page)));
    }
    function renderPages() {
      pageViews.innerHTML = pages.slice(1).map(([id, label, desc]) => {
        const items = pageBlocks[id].map((text) => `<li>${text}</li>`).join("");
        const switches = [`<button class="subpage-switch" data-page="home">返回主页</button>`]
          .concat(pages.slice(1).map(([pageId, pageLabel]) => `<button class="subpage-switch${pageId === id ? " active" : ""}" data-page="${pageId}">${pageLabel}</button>`))
          .join("");
        return `<section class="page-shell" data-page-view="${id}">
          <div class="subpage-nav">${switches}</div>
          <div class="timeline-head"><div><div class="eyebrow">Sub Page</div><h2>${label}</h2><p class="subtitle">${desc}</p></div></div>
          <div class="page-columns">
            <article class="block"><h3>页面主内容</h3><ul class="page-list">${items.map((item) => `<li><span>${item}</span></li>`).join("")}</ul></article>
            <article class="block"><h3>当前页说明</h3><p>这里会是一份统一正文。AI 可以持续整理，但不会自动整页覆盖；你可以直接编辑，也可以通过评论让 AI 改某一段。</p><p>如果某条评论原来的高亮或图形消失，它仍然保留，只会变成“未定位”状态。</p></article>
          </div>
        </section>`;
      }).join("");
      pageViews.querySelectorAll("[data-page]").forEach((node) => node.addEventListener("click", () => openPage(node.dataset.page)));
    }
    function renderTimeline() {
      timelineList.innerHTML = timeline.map((group) => `
        <section class="phase">
          <h3>${group.phase}</h3>
          ${group.events.map(([date, title, flags]) => `<article class="event"><small>${date}</small><strong>${title}</strong><div class="flags">${flags.map((flag) => `<span class="flag${flag.includes("未定位") ? " orphan" : ""}">${flag}</span>`).join("")}</div></article>`).join("")}
        </section>`).join("");
    }
    function openPage(id) {
      const isHome = id === "home";
      document.querySelectorAll("[data-page]").forEach((node) => node.classList.toggle("active", node.dataset.page === id));
      homeView.style.display = isHome ? "grid" : "none";
      pageViews.classList.toggle("active", !isHome);
      document.querySelectorAll("[data-page-view]").forEach((node) => node.classList.toggle("active", node.dataset.pageView === id));
      location.hash = id;
    }
    document.getElementById("closeComments").addEventListener("click", () => drawer.classList.remove("open"));
    document.querySelectorAll("[data-open-comments]").forEach((node) => node.addEventListener("click", () => drawer.classList.add("open")));
    renderHome();
    renderPages();
    renderTimeline();
    openPage(location.hash.replace("#", "") || "home");
  </script>
</body>
</html>
