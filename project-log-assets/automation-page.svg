<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1520" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFF"/>
      <stop offset="1" stop-color="#F2F5FF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1060" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#9BAAF1" flood-opacity="0.16"/>
    </filter>
    <style>
      .eyebrow { font: 700 12px "Segoe UI","Microsoft YaHei",sans-serif; letter-spacing: 1.3px; fill: #5F69F2; }
      .h1 { font: 700 28px "Segoe UI","Microsoft YaHei",sans-serif; fill: #252F57; }
      .h2 { font: 700 18px "Segoe UI","Microsoft YaHei",sans-serif; fill: #2C3563; }
      .h3 { font: 700 15px "Segoe UI","Microsoft YaHei",sans-serif; fill: #2F3969; }
      .body { font: 500 14px "Segoe UI","Microsoft YaHei",sans-serif; fill: #67728F; }
      .small { font: 700 12px "Segoe UI","Microsoft YaHei",sans-serif; fill: #4B59C7; }
      .pill { font: 700 12px "Segoe UI","Microsoft YaHei",sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="32" y="28" width="1536" height="924" rx="28" fill="#FFFFFF" stroke="#E3E8FF"/>
  </g>

  <text x="78" y="84" class="eyebrow">AUTOMATION WORKSPACE</text>
  <text x="78" y="124" class="h1">自动化展示页</text>
  <text x="78" y="152" class="body">自动化页现在只显示真实来源：显式自动化、应用 workflow、源码审计后的真实 DAG。</text>
  <text x="78" y="176" class="body">列表页和详情页都会订阅 automation workspace 变更事件，源码流程 sidecar 或相关源文件变化后自动重拉。</text>

  <rect x="1224" y="72" width="278" height="50" rx="16" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="1254" y="104" class="body">搜索自动化名称 / 流程说明</text>

  <rect x="78" y="194" width="86" height="42" rx="16" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="102" y="221" class="h3">运行中</text>
  <rect x="178" y="194" width="86" height="42" rx="16" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="202" y="221" class="h3">未启动</text>
  <rect x="278" y="194" width="116" height="42" rx="16" fill="#5F69F2"/>
  <text x="308" y="221" class="h3" fill="#FFFFFF">全部自动化</text>

  <text x="78" y="286" class="h2">真实自动化</text>
  <text x="78" y="312" class="body">显式 automation 配置和应用 workflow 继续保留运行状态与日志入口。</text>

  <rect x="78" y="334" width="876" height="108" rx="22" fill="#FFFFFF" stroke="#E3E8FF"/>
  <rect x="102" y="364" width="44" height="44" rx="14" fill="#EEF1FF"/>
  <rect x="120" y="378" width="8" height="16" rx="3" fill="#5F69F2"/>
  <text x="170" y="374" class="h2">每日同步</text>
  <text x="170" y="402" class="body">显式 automation，点进详情后展示真实执行 DAG。</text>
  <rect x="170" y="416" width="86" height="28" rx="14" fill="#EEF1FF"/>
  <text x="192" y="434" class="pill" fill="#4B59C7">显式自动化</text>
  <rect x="730" y="368" width="74" height="28" rx="14" fill="#EEF5EF"/>
  <text x="754" y="386" class="pill" fill="#23904D">运行中</text>
  <rect x="826" y="360" width="104" height="40" rx="14" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="850" y="386" class="h3">运行日志</text>

  <rect x="78" y="458" width="876" height="108" rx="22" fill="#FFFFFF" stroke="#E3E8FF"/>
  <rect x="102" y="488" width="44" height="44" rx="14" fill="#EEF1FF"/>
  <circle cx="124" cy="510" r="11" fill="#5F69F2"/>
  <text x="170" y="498" class="h2">Wiki 通用助手</text>
  <text x="170" y="526" class="body">应用 workflow 派生出的真实流程，节点里会继续显示应用和模型。</text>
  <rect x="170" y="540" width="74" height="28" rx="14" fill="#EEF1FF"/>
  <text x="190" y="558" class="pill" fill="#4B59C7">应用流程</text>
  <rect x="730" y="492" width="74" height="28" rx="14" fill="#EEF5EF"/>
  <text x="754" y="510" class="pill" fill="#23904D">运行中</text>
  <rect x="826" y="484" width="104" height="40" rx="14" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="850" y="510" class="h3">运行日志</text>

  <text x="78" y="632" class="h2">源码真实流程</text>
  <text x="78" y="658" class="body">只保留经过人工审计、能明确定位源码入口和分支条件的系统流程。</text>

  <rect x="78" y="680" width="876" height="108" rx="22" fill="#FFFFFF" stroke="#E3E8FF"/>
  <rect x="102" y="710" width="44" height="44" rx="14" fill="#EEF1FF"/>
  <path d="M116 720H132V744H116V720Z" fill="#5F69F2"/>
  <text x="170" y="720" class="h2">同步入口</text>
  <text x="170" y="748" class="body">源码真实 DAG：从点击同步按钮，到 intake 扫描、条件分叉、启动 run。</text>
  <rect x="170" y="762" width="98" height="28" rx="14" fill="#EEF1FF"/>
  <text x="194" y="780" class="pill" fill="#4B59C7">源码真实流程</text>

  <rect x="986" y="262" width="536" height="550" rx="26" fill="#FFFFFF" stroke="#E3E8FF"/>
  <text x="1020" y="306" class="eyebrow">DETAIL VIEW</text>
  <text x="1020" y="344" class="h1">同步入口</text>
  <text x="1020" y="372" class="small">源码真实流程</text>
  <text x="1020" y="396" class="body">详情页只展示真实 DAG，不再显示 project-log 文档步骤。</text>

  <line x1="1278" y1="442" x2="1278" y2="744" stroke="#CCD5FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1278 474 L1270 458 H1286 Z" fill="#B8C3FF"/>
  <path d="M1278 584 L1270 568 H1286 Z" fill="#B8C3FF"/>
  <path d="M1202 654 H1102 V618" stroke="#B8C3FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1102 626 L1094 610 H1110 Z" fill="#B8C3FF"/>
  <path d="M1354 654 H1454 V618" stroke="#B8C3FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1454 626 L1446 610 H1462 Z" fill="#B8C3FF"/>

  <rect x="1110" y="430" width="336" height="82" rx="22" fill="#F7F9FF" stroke="#DCE3FF"/>
  <text x="1136" y="462" class="h3">点击同步按钮</text>
  <text x="1136" y="490" class="body">bindRunPage() 的 startButton click handler。</text>

  <rect x="1110" y="540" width="336" height="82" rx="22" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="1136" y="572" class="h3">GET /api/intake/scan</text>
  <text x="1136" y="600" class="body">confirmSyncPlan() -> loadIntakeScan()</text>

  <rect x="1122" y="650" width="312" height="72" rx="22" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="1150" y="690" class="h3">scan.items 是否为空</text>

  <rect x="1000" y="742" width="224" height="96" rx="22" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="1026" y="778" class="h3">未检测到新源料</text>
  <text x="1026" y="804" class="body">直接提示并结束</text>

  <rect x="1332" y="742" width="156" height="96" rx="22" fill="#FFFFFF" stroke="#DCE3FF"/>
  <text x="1358" y="778" class="h3">继续后续判断</text>
  <text x="1358" y="804" class="body">进入 plan / confirm 分支</text>

  <text x="1020" y="878" class="body">右侧评论按钮、分支拖动与箭头连线都只作用于这些真实 DAG 节点。</text>
  <text x="1020" y="902" class="body">当源码流程 sidecar、被审计源码文件或 automation / agent 配置变化时，当前详情页会自动收到 SSE 刷新。</text>
</svg>
